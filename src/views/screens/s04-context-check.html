<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Pair Navigator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="{{commonCssUri}}" />
    <link rel="stylesheet" href="{{screenCssUri}}" />
  </head>
  <body>

    <!-- 戻るヘッダー -->
    <div class="back-header" id="back">&#x2190; 戻る</div>

    <!-- S04-00: タイトル -->
    <div class="page-title">送信範囲確認</div>
    <div class="page-subtitle">AIに送信される情報の範囲と除外設定を確認できます</div>

    <!-- S04-01: 送信対象カテゴリ -->
    <div class="section-title">送信対象カテゴリ</div>

    {{categoryCards}}

    <!-- S04-02: 対象ファイル一覧 -->
    <div class="section-title" style="margin-top:14px;">対象ファイル一覧</div>

    {{targetFilesList}}

    <!-- S04-03: 除外設定 -->
    <div class="section-title" style="margin-top:14px;">除外設定</div>
    <div class="exclude-config">
      <div class="pattern-label">除外パターン:</div>
      <div class="pattern-list">
        {{excludePatterns}}
      </div>
      <div class="max-size">{{maxSizeLabel}}</div>
    </div>

    <!-- S04-04: 推定送信量 -->
    <div class="estimated-card">
      <span class="est-icon material-symbols-outlined">inventory_2</span>
      <div class="est-body">
        <div class="est-title">推定送信量</div>
        <div class="est-detail">{{estimatedSize}}</div>
      </div>
    </div>

    <!-- S04-05: アクションボタン -->
    <div class="s04-actions">
      <button id="editExclude" class="btn-action"><span class="material-symbols-outlined">settings</span> 除外設定を編集</button>
      <button id="close" class="btn-action btn-back">閉じる</button>
    </div>

    <script>
      const vscode = acquireVsCodeApi();
      document.getElementById('editExclude')?.addEventListener('click', () => {
        vscode.postMessage({ type: 'navigate', screen: 's06' });
      });
      document.getElementById('close')?.addEventListener('click', () => {
        vscode.postMessage({ type: 'navigateBack' });
      });
      document.getElementById('back')?.addEventListener('click', () => {
        vscode.postMessage({ type: 'navigateBack' });
      });
    </script>
  </body>
</html>
