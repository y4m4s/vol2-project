<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Pair Navigator</title>
    <link rel="stylesheet" href="{{commonCssUri}}" />
  </head>
  <body>
    <!-- S07-01: 状態タイトル / S07-02: 状態説明 -->
    <div class="card">
      <strong>{{errorTitle}}</strong>
      <p class="muted">{{errorDescription}}</p>
    </div>

    <!-- S07-03: 推奨アクション -->
    <div class="card">
      <strong>次のアクション</strong>
      <p class="muted">{{recommendedAction}}</p>
      <!-- S07-04: 再試行 -->
      <button id="retry">再試行</button>
    </div>

    <!-- S07-05: Copilotセットアップ案内 / S07-06: Workspace信頼案内 -->
    <div class="card">
      <strong>セットアップ案内</strong>
      <p class="muted">・GitHub Copilot をインストールして有効化してください</p>
      <p class="muted">・このフォルダーを Trusted Workspace に設定してください</p>
      <!-- S07-07: 設定を開く -->
      <button id="openSettings" class="secondary">設定を開く</button>
    </div>

    <!-- S07-08: 戻る -->
    <div class="card">
      <button id="back" class="secondary">← 戻る</button>
    </div>

    <script>
      const vscode = acquireVsCodeApi();
      document.getElementById('retry')?.addEventListener('click', () => {
        vscode.postMessage({ type: 'connect' });
      });
      document.getElementById('openSettings')?.addEventListener('click', () => {
        vscode.postMessage({ type: 'navigate', screen: 's06' });
      });
      document.getElementById('back')?.addEventListener('click', () => {
        vscode.postMessage({ type: 'navigate', screen: 's01' });
      });
    </script>
  </body>
</html>
