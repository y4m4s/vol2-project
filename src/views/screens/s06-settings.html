<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Pair Navigator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="{{commonCssUri}}" />
    <link rel="stylesheet" href="{{screenCssUri}}" />
  </head>
  <body>

    <!-- 戻るヘッダー -->
    <div class="back-header" id="back">&#x2190; 戻る</div>

    <!-- タイトル -->
    <div class="page-title">設定</div>
    <div class="page-subtitle">拡張機能の動作を設定できます</div>

    <!-- === モード設定 === -->
    <div class="settings-section"><span class="material-symbols-outlined">tune</span> モード設定</div>

    <div class="setting-item">
      <div class="setting-row">
        <div>
          <div class="setting-label">初期モード</div>
          <div class="setting-desc">起動時に使用するモード</div>
        </div>
        <div class="dropdown-wrap">
          <select id="defaultMode">
            <option value="manual" {{modeManualSelected}}>必要時</option>
            <option value="always" {{modeAlwaysSelected}}>常時</option>
          </select>
        </div>
      </div>
    </div>

    <div class="toggle-row">
      <div class="toggle-label">
        <div class="toggle-title">常時モードを有効化</div>
        <div class="toggle-desc">自動的にアドバイスを受け取ります</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="alwaysModeEnabled" {{alwaysModeChecked}} />
        <span class="slider"></span>
      </label>
    </div>

    <!-- === 頻度制御 === -->
    <div class="settings-section"><span class="material-symbols-outlined">speed</span> 頻度制御</div>

    <div class="range-group">
      <div class="range-header">
        <span class="range-label">リクエスト間隔</span>
        <span class="range-value" id="intervalValue">{{requestIntervalSec}}秒</span>
      </div>
      <input type="range" id="requestInterval" min="10" max="120" value="{{requestIntervalSec}}" />
    </div>

    <div class="range-group">
      <div class="range-header">
        <span class="range-label">アイドル時間</span>
        <span class="range-value" id="idleValue">{{idleDelaySec}}秒</span>
      </div>
      <input type="range" id="idleDelay" min="1" max="60" value="{{idleDelaySec}}" />
    </div>

    <div class="toggle-row">
      <div class="toggle-label">
        <div class="toggle-title">重複抑制</div>
        <div class="toggle-desc">類似助言の繰り返しを防ぎます</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="suppressDuplicate" {{suppressDuplicateChecked}} />
        <span class="slider"></span>
      </label>
    </div>

    <!-- === 送信対象設定 === -->
    <div class="settings-section"><span class="material-symbols-outlined">send</span> 送信対象設定</div>

    <div class="context-toggle-item">
      <span>アクティブファイル</span>
      <label class="switch">
        <input type="checkbox" id="ctxActiveFile" {{ctxActiveFileChecked}} />
        <span class="slider"></span>
      </label>
    </div>
    <div class="context-toggle-item">
      <span>選択範囲</span>
      <label class="switch">
        <input type="checkbox" id="ctxSelection" {{ctxSelectionChecked}} />
        <span class="slider"></span>
      </label>
    </div>
    <div class="context-toggle-item">
      <span>診断情報</span>
      <label class="switch">
        <input type="checkbox" id="ctxDiagnostics" {{ctxDiagnosticsChecked}} />
        <span class="slider"></span>
      </label>
    </div>
    <div class="context-toggle-item">
      <span>最近の編集</span>
      <label class="switch">
        <input type="checkbox" id="ctxRecentEdits" {{ctxRecentEditsChecked}} />
        <span class="slider"></span>
      </label>
    </div>
    <div class="context-toggle-item">
      <span>関連シンボル</span>
      <label class="switch">
        <input type="checkbox" id="ctxSymbols" {{ctxSymbolsChecked}} />
        <span class="slider"></span>
      </label>
    </div>

    <!-- === 除外設定 === -->
    <div class="settings-section"><span class="material-symbols-outlined">block</span> 除外設定</div>

    <div style="font-size:0.9em; margin-bottom:4px;">除外パターン (glob)</div>
    <div class="exclude-textarea">
      <textarea id="excludeGlobs" placeholder="例: **/.env">{{excludeGlobs}}</textarea>
    </div>

    <!-- === アクションボタン === -->
    <div class="s06-actions">
      <button id="save"><span class="material-symbols-outlined">save</span> 保存</button>
      <button id="reset" class="btn-gray"><span class="material-symbols-outlined">restart_alt</span> 初期値に戻す</button>
    </div>

    <script>
      const vscode = acquireVsCodeApi();

      // スライダーの値をリアルタイム表示
      document.getElementById('requestInterval')?.addEventListener('input', (e) => {
        document.getElementById('intervalValue').textContent = e.target.value + '秒';
      });
      document.getElementById('idleDelay')?.addEventListener('input', (e) => {
        document.getElementById('idleValue').textContent = e.target.value + '秒';
      });

      document.getElementById('save')?.addEventListener('click', () => {
        vscode.postMessage({
          type: 'saveSettings',
          defaultMode: document.getElementById('defaultMode').value,
          alwaysModeEnabled: document.getElementById('alwaysModeEnabled').checked,
          requestIntervalSec: Number(document.getElementById('requestInterval').value),
          idleDelaySec: Number(document.getElementById('idleDelay').value),
          suppressDuplicate: document.getElementById('suppressDuplicate').checked,
          ctxActiveFile: document.getElementById('ctxActiveFile').checked,
          ctxSelection: document.getElementById('ctxSelection').checked,
          ctxDiagnostics: document.getElementById('ctxDiagnostics').checked,
          ctxRecentEdits: document.getElementById('ctxRecentEdits').checked,
          ctxSymbols: document.getElementById('ctxSymbols').checked,
          excludeGlobs: document.getElementById('excludeGlobs').value,
        });
      });
      document.getElementById('reset')?.addEventListener('click', () => {
        vscode.postMessage({ type: 'resetSettings' });
      });
      document.getElementById('back')?.addEventListener('click', () => {
        vscode.postMessage({ type: 'navigateBack' });
      });
    </script>
  </body>
</html>
